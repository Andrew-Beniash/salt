[alembic]
script_location = alembic
# Add the project root (WORKDIR /app inside Docker) to sys.path so that
# `from app.models import Base` resolves correctly in env.py.
prepend_sys_path = .
# URL is overridden in env.py from the DATABASE_URL environment variable.
# This value is used only for `alembic` CLI invocations that don't go
# through env.py (e.g. alembic branches).
sqlalchemy.url = postgresql+asyncpg://salt:salt@db:5432/salt

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
