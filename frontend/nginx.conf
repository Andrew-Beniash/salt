server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Use Docker's embedded DNS resolver; resolve API hostname at request time
    # so nginx starts even if the API container isn't ready yet.
    resolver 127.0.0.11 valid=30s;

    # SPA fallback: unknown paths return index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api/* → FastAPI (strips the /api prefix)
    location /api/ {
        set $backend http://api:8000;
        proxy_pass $backend/;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
