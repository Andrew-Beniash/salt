version: "3.9"

# ─── Reusable fragments ────────────────────────────────────────────────────────
x-app-env: &app-env
  env_file:
    - path: ../.env
      required: false          # stack starts without .env; use .env for real creds

x-backend-build: &backend-build
  build:
    context: ../backend
    dockerfile: Dockerfile

x-worker-deps: &worker-deps
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL 16 ────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: salt
      POSTGRES_PASSWORD: salt
      POSTGRES_DB: salt
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U salt"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis 7 ──────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI ───────────────────────────────────────────────────────────────────
  api:
    <<: [*backend-build, *app-env, *worker-deps]
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ../storage:/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── Celery — ingestion queue (gevent, 20 concurrency) ─────────────────────────
  worker-ingestion:
    <<: [*backend-build, *app-env, *worker-deps]
    restart: unless-stopped
    command: celery -A app.worker worker -Q ingestion --pool=gevent -c 20 --loglevel=info
    volumes:
      - ../storage:/storage

  # ── Celery — extraction queue (gevent, 100 concurrency, 2 replicas) ───────────
  worker-extraction:
    <<: [*backend-build, *app-env, *worker-deps]
    restart: unless-stopped
    command: celery -A app.worker worker -Q extraction --pool=gevent -c 100 --loglevel=info
    volumes:
      - ../storage:/storage
    deploy:
      replicas: 2

  # ── Celery — routing queue (prefork, 8 concurrency) ───────────────────────────
  worker-routing:
    <<: [*backend-build, *app-env, *worker-deps]
    restart: unless-stopped
    command: celery -A app.worker worker -Q routing --pool=prefork -c 8 --loglevel=info

  # ── Celery — notification queue (gevent, 4 concurrency) ───────────────────────
  worker-notification:
    <<: [*backend-build, *app-env, *worker-deps]
    restart: unless-stopped
    command: celery -A app.worker worker -Q notification --pool=gevent -c 4 --loglevel=info

  # ── Flower (Celery dashboard) ─────────────────────────────────────────────────
  flower:
    <<: [*backend-build, *app-env]
    restart: unless-stopped
    # $$VAR → $VAR after compose substitution; shell then expands with default
    command: >
      sh -c 'celery -A app.worker flower
      --port=5555
      --basic-auth=$${FLOWER_BASIC_AUTH:-admin:change-me}'
    ports:
      - "5555:5555"
    depends_on:
      redis:
        condition: service_healthy

  # ── React SPA ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  pgdata:
